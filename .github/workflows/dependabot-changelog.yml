name: 'Add Dependabot Changelog'
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled

jobs:
  changelog:
    runs-on: ubuntu-latest

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write

    steps:
      # Add changelog entry
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
          # Value already defaults to true, but `persist-credentials` is required to push new commits to the repository.
          persist-credentials: true
      - uses: dangoslen/dependabot-changelog-helper@v4.3.0
        with:
          activationLabels: dependencies
          changelogPath: 'CHANGELOG.md'
          dependencyTool: dependabot
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Updated Changelog"